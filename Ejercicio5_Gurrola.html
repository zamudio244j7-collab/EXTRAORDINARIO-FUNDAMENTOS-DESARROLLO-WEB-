<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 5 - JavaScript</title>
</head>
<body>

    <script>
        let num = Number(prompt("Ingresa un número:"));

        if (num > 0) {
            document.write("El número es positivo");
        } else if (num < 0) {
            document.write("El número es negativo");
        } else {
            document.write("El número es cero");
        }
    </script>

</body>
</html>
