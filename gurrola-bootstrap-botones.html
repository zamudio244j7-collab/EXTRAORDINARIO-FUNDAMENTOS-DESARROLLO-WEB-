<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica Bootstrap 5.3 - Botones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .btn-personalizado {
            background-color: #6f42c1;
            color: white;
            border-radius: 25px;
            border: none;
            padding: 10px 25px;
        }
        .btn-personalizado:hover {
            background-color: #563d7c;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container text-center mt-5">
        <h1 class="mb-4">Tipos de Botones en Bootstrap 5.3</h1>
        <p>Ejemplo de aplicación de estilos y variantes.</p>

        <div class="mt-4">
            <h2>Botones básicos</h2>
            <button type="button" class="btn btn-primary">Primario</button>
            <button type="button" class="btn btn-secondary">Secundario</button>
            <button type="button" class="btn btn-success">Éxito</button>
            <button type="button" class="btn btn-danger">Peligro</button>
            <button type="button" class="btn btn-warning">Advertencia</button>
            <button type="button" class="btn btn-info">Información</button>
            <button type="button" class="btn btn-light">Claro</button>
            <button type="button" class="btn btn-dark">Oscuro</button>
        </div>

        <div class="container text-center mt-5">
            <h2>Tamaños de botones</h2>
            <button type="button" class="btn btn-primary btn-lg m-2">Grande</button>
            <button type="button" class="btn btn-primary m-2">Normal</button>
            <button type="button" class="btn btn-primary btn-sm m-2">Pequeño</button>
        </div>

        <div class="container text-center mt-5">
            <h2>Botones Outline</h2>
            <button type="button" class="btn btn-outline-primary m-2">Primario</button>
            <button type="button" class="btn btn-outline-danger m-2">Peligro</button>
            <button type="button" class="btn btn-outline-success m-2">Éxito</button>
            <button type="button" class="btn btn-outline-warning m-2">Advertencia</button>
            <button type="button" class="btn btn-outline-info m-2">Información</button>
            <button type="button" class="btn btn-outline-dark m-2">Oscuro</button>
        </div>

        <div class="container text-center mt-5">
            <h2>Botones con iconos</h2>
            <button type="button" class="btn btn-primary m-2"><i class="bi bi-star"></i> Favorito</button>
            <button type="button" class="btn btn-success m-2"><i class="bi bi-check-circle"></i> Aceptar</button>
            <button type="button" class="btn btn-danger m-2"><i class="bi bi-trash"></i> Eliminar</button>
            <button type="button" class="btn btn-info m-2"><i class="bi bi-info-circle"></i> Información</button>
        </div>

        <div class="container text-center mt-5">
            <h2>Botones en rejilla (grid)</h2>
            <div class="row g-3">
                <div class="col-md-4">
                    <button type="button" class="btn btn-primary w-100 p-3">Columna 1</button>
                </div>
                <div class="col-md-4">
                    <button type="button" class="btn btn-success w-100 p-3">Columna 2</button>
                </div>
                <div class="col-md-4">
                    <button type="button" class="btn btn-danger w-100 p-3">Columna 3</button>
                </div>
            </div>
        </div>

        <div class="container text-center mt-5 mb-5">
            <h2>Botón personalizado</h2>
            <button type="button" class="btn-personalizado"><i class="bi bi-palette"></i> Personalizado</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
