<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 11 - JavaScript</title>
</head>
<body>

    <form onsubmit="return validar()">
        Contraseña: <input type="password" id="p1" required><br>
        Repite: <input type="password" id="p2" required><br>
        <input type="submit" value="Registrar">
    </form>

    <p id="res"></p>

    <script>
        function validar() {
            let p1 = document.getElementById("p1").value;
            let p2 = document.getElementById("p2").value;
            let res = document.getElementById("res");

            if (p1 === p2) {
                res.innerHTML = "Contraseñas coinciden.";
                return true;
            } else {
                res.innerHTML = "Las contraseñas no coinciden.";
                return false;
            }
        }
    </script>

</body>
</html>
