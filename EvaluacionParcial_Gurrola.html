<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Interactivo - Evaluación JavaScript</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f6f9;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .counter-display {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #3498db;
            border-radius: 10px;
            background-color: #ecf0f1;
            min-width: 150px;
            display: inline-block;
            transition: color 0.3s ease;
        }

        .color-cero { color: #7f8c8d; }
        .color-positivo { color: #27ae60; }
        .color-negativo { color: #c0392b; }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            background-color: #bdc3c7;
            color: #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }

        .btn-increment {
            background-color: #27ae60;
            color: white;
        }

        .btn-increment:hover:not(:disabled) {
            background-color: #219a52;
        }

        .btn-decrement {
            background-color: #e74c3c;
            color: white;
        }

        .btn-decrement:hover:not(:disabled) {
            background-color: #c0392b;
        }

        .btn-reset {
            background-color: #3498db;
            color: white;
        }

        .btn-reset:hover:not(:disabled) {
            background-color: #2980b9;
        }

        .message {
            margin-top: 15px;
            color: #e74c3c;
            font-weight: bold;
            min-height: 24px;
        }

        .info {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #777;
        }

        .info small {
            display: block;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contador Interactivo</h1>
        <div class="counter-display color-cero" id="counter">0</div>

        <div class="controls">
            <button class="btn btn-decrement" id="decrementBtn">-</button>
            <button class="btn btn-reset" id="resetBtn">Reiniciar</button>
            <button class="btn btn-increment" id="incrementBtn">+</button>
        </div>

        <div class="message" id="message"></div>

        <div class="info">
            <small>Límites: -10 a 10 | Teclas: +, -, flechas, R</small>
            <small>Facultad de Informática Mazatlán - UAS</small>
            <small>Fundamentos de Desarrollo Web - Dr. José Alfonso Aguilar Calderón</small>
        </div>
    </div>

    <script>
        const MIN_COUNT = -10;
        const MAX_COUNT = 10;

        let count = 0;
        let timeoutId = null;

        const counterElement = document.getElementById('counter');
        const incrementBtn = document.getElementById('incrementBtn');
        const decrementBtn = document.getElementById('decrementBtn');
        const resetBtn = document.getElementById('resetBtn');
        const messageElement = document.getElementById('message');

        function showMessage(text) {
            messageElement.textContent = text;
        }

        function clearMessage() {
            messageElement.textContent = '';
        }

        function updateCounter() {
            counterElement.textContent = count;

            counterElement.className = 'counter-display';
            if (count === 0) {
                counterElement.classList.add('color-cero');
            } else if (count > 0) {
                counterElement.classList.add('color-positivo');
            } else {
                counterElement.classList.add('color-negativo');
            }

            incrementBtn.disabled = count >= MAX_COUNT;
            decrementBtn.disabled = count <= MIN_COUNT;

            if (count >= MAX_COUNT) {
                showMessage('Has alcanzado el límite máximo (10)');
            } else if (count <= MIN_COUNT) {
                showMessage('Has alcanzado el límite mínimo (-10)');
            } else {
                clearMessage();
            }
        }

        function validateCounterOperation(operation, value) {
            switch(operation) {
                case 'increment': return value < MAX_COUNT;
                case 'decrement': return value > MIN_COUNT;
                case 'reset': return true;
                default: return false;
            }
        }

        function increment() {
            if (validateCounterOperation('increment', count)) {
                count++;
                updateCounter();
            }
        }

        function decrement() {
            if (validateCounterOperation('decrement', count)) {
                count--;
                updateCounter();
            }
        }

        function reset() {
            if (validateCounterOperation('reset', count)) {
                count = 0;
                updateCounter();
                showMessage('Contador reiniciado a 0');
                if (timeoutId) clearTimeout(timeoutId);
                timeoutId = setTimeout(clearMessage, 2000);
            }
        }

        incrementBtn.addEventListener('click', increment);
        decrementBtn.addEventListener('click', decrement);
        resetBtn.addEventListener('click', reset);

        document.addEventListener('keydown', function(event) {
            switch(event.key) {
                case '+':
                case 'ArrowUp':
                    increment();
                    break;
                case '-':
                case 'ArrowDown':
                    decrement();
                    break;
                case 'r':
                case 'R':
                    reset();
                    break;
            }
        });

        updateCounter();

        console.log('Contador básico inicializado.');
        console.log('Usa los botones + y - para modificar el contador');
        console.log('También puedes usar las teclas: +, -, R, flechas arriba/abajo');
    </script>

</body>
</html>
