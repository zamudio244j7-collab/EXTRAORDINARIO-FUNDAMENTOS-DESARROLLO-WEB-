<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 9 - JavaScript</title>
</head>
<body>

    <script>
        let a = Number(prompt("Calificación 1:"));
        let b = Number(prompt("Calificación 2:"));
        let c = Number(prompt("Calificación 3:"));
        let prom = (a + b + c) / 3;

        document.write("Promedio: " + prom + "<br>");

        if (prom >= 60) {
            document.write("Aprobado");
        } else {
            document.write("Reprobado");
        }
    </script>

</body>
</html>
