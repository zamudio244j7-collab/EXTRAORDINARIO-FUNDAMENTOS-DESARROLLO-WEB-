<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de registro Mi web</title>
</head>
<body>

    <form action="" method="POST">
        <p>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" maxlength="50" required>
        </p>

        <p>
            <label for="apellidos">Apellidos:</label>
            <input type="text" id="apellidos" name="apellidos" maxlength="50" required>
        </p>

        <p>
            Sexo:
            <input type="radio" id="hombre" name="sexo" value="hombre" required>
            <label for="hombre">Hombre</label>
            <input type="radio" id="mujer" name="sexo" value="mujer">
            <label for="mujer">Mujer</label>
        </p>

        <p>
            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" required>
        </p>

        <p>
            <input type="checkbox" id="info" name="info" checked>
            <label for="info">Deseo recibir información sobre novedades y ofertas</label>
        </p>

        <p>
            <input type="checkbox" id="condiciones" name="condiciones" required>
            <label for="condiciones">Declaro haber leido y aceptar las condiciones generales del programa y la normativa sobre protección de datos</label>
        </p>

        <p>
            <input type="submit" value="Enviar">
        </p>
    </form>

    <footer>
        <p>Nombre: [Tu nombre] | Grupo: [Tu grupo] | Fecha: 25/06/2026</p>
    </footer>

</body>
</html>
