<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 6 - JavaScript</title>
</head>
<body>

    <script>
        let n = Number(prompt("Número:"));
        for (let i = 1; i <= 10; i++) {
            document.write(n + " x " + i + " = " + (n * i) + "<br>");
        }
    </script>

</body>
</html>
